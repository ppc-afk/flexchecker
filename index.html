    <title>Telegram: Contact @flexcheker</title>
    <!-- Подключаем Tailwind CSS для быстрой и адаптивной верстки -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Имитация фирменного фона Telegram с дудлами (используем паттерн) */
        body {
            background-color: #0f0f0f;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Стили для анимированного свечения аватарки */
        .avatar-glow {
            box-shadow: 0 0 20px rgba(0, 255, 128, 0.2), inset 0 0 20px rgba(0, 255, 128, 0.1);
        }

        /* Анимация пульсации для основной кнопки (повышает конверсию) */
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .btn-pulse {
            animation: pulse-soft 2s infinite;
        }
    </style>

<body class="min-h-screen flex flex-col text-white">

    <!-- Основной контент (Карточка канала) -->
    <main class="flex-grow flex items-center justify-center p-4 relative z-10">
        <div class="bg-[#212121] rounded-2xl w-full max-w-[360px] p-6 sm:p-8 flex flex-col items-center text-center shadow-2xl relative overflow-hidden">
            
            <!-- Аватарка канала -->
            <div class="w-24 h-24 sm:w-28 sm:h-28 rounded-full bg-[#0a0a0a] border border-gray-800 flex items-center justify-center mb-5 avatar-glow relative cursor-pointer" onclick="redirectToChannel()">
                <!-- Иконка щита внутри аватарки (имитация логотипа VivoCheck) -->
                <svg class="w-12 h-12 text-[#00ff80] drop-shadow-[0_0_8px_rgba(0,255,128,0.8)]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    <path d="m9 12 2 2 4-4"></path>
                    <!-- "Крылья" / галочка сверху -->
                    <path d="M8 7c1.5-1 3.5-1 4-1s2.5 0 4 1"></path>
                </svg>
            </div>

            <!-- Название канала -->
            <h1 class="text-white text-xl sm:text-2xl font-bold mb-6 leading-tight cursor-pointer" onclick="redirectToChannel()">
                FlexCheck | Узнай как ты записан
            </h1>

            <!-- Главная кнопка -->
            <button onclick="redirectToChannel()" class="w-full bg-[#3390ec] hover:bg-[#2b7bc9] active:bg-[#2368a2] text-white font-bold py-3.5 rounded-full transition-all transform active:scale-95 btn-pulse text-[15px] uppercase tracking-wide">
                Открыть в Telegram
            </button>
        </div>
    </main>

    <!-- Скрипт для управления редиректом -->
    <script>
        // ==========================================
        // НАСТРОЙКА ССЫЛКИ
        // Замени ссылку в кавычках на нужную тебе.
        // ==========================================
        const TARGET_URL = 'https://t.me/flexcheck_dwpnc_robot';

        // Функция редиректа
        function redirectToChannel() {
            window.location.href = TARGET_URL;
        }

        // Автоматически направляем пользователя, если он кликает в любую свободную область карточки
        // Это часто помогает улучшить конверсию на прелендингах с мобильных устройств
        document.querySelector('.bg-\\[\\#212121\\]').addEventListener('click', function(e) {
            // Предотвращаем двойное срабатывание, если кликнули прямо по кнопке
            if(e.target.tagName !== 'BUTTON') {
                redirectToChannel();
            }
        });
    </script>
</body>
